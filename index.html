<script>
        const canvas = document.getElementById('threadCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let points = [];
        const numPoints = 120;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initPoints();
        }

        function initPoints() {
            points = [];
            for (let i = 0; i < numPoints; i++) {
                points.push({
                    x: (width / numPoints) * i,
                    y: height / 2,
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.01 + Math.random() * 0.02
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            
            ctx.strokeStyle = '#ecbd9e';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                p.angle += p.speed;
                const offset = Math.sin(p.angle) * 80;
                
                // Add some mouse influence
                const dx = p.x - mouseX;
                const dy = (p.y + offset) - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = Math.max(0, (200 - dist) / 200);
                
                const finalY = (height / 2) + offset + (influence * (mouseY - height/2));
                
                ctx.lineTo(p.x, finalY);
            }
            
            ctx.stroke();

            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ecbd9e';
            ctx.stroke();
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', resize);
        resize();
        draw();

        // Subtle parallax for the logo
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const logo = document.querySelector('img');
            if (logo) {
                logo.style.transform = `translateY(${scrolled * 0.15}px)`;
            }
        });
    </script>
